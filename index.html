<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Slime</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    header {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      color: #eee;
    }

    header h1 {
      font-size: 1.8rem;
      color: #7fff00;
      text-shadow: 0 0 12px #7fff0080;
      letter-spacing: 2px;
    }

    #hud {
      display: flex;
      gap: 24px;
      font-size: 1.1rem;
    }

    #hud span { color: #ccc; }
    #hud strong { color: #fff; }

    #game-area {
      position: relative;
      width: 800px;
      height: 520px;
      background: #16213e;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #0f3460;
      box-shadow: 0 0 40px #0f346060;
    }

    canvas { display: block; }

    #answer-bar {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
    }

    .ans-btn {
      padding: 14px 28px;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #0f3460;
      color: #eee;
      border: 2px solid #1a4a80;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      min-width: 80px;
    }

    .ans-btn:hover {
      background: #1a5296;
      box-shadow: 0 0 14px #1a529660;
      transform: scale(1.06);
    }

    .ans-btn.correct {
      background: #2ecc40;
      border-color: #27ae35;
      box-shadow: 0 0 18px #2ecc4080;
    }

    .ans-btn.wrong {
      background: #e74c3c;
      border-color: #c0392b;
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000000cc;
      border-radius: 14px;
      z-index: 10;
      color: #eee;
      text-align: center;
      gap: 20px;
    }

    #overlay h2 { font-size: 2.6rem; color: #7fff00; text-shadow: 0 0 16px #7fff0080; }
    #overlay p  { font-size: 1.2rem; color: #ccc; }
    #overlay .big { font-size: 2rem; color: #fff; font-weight: bold; }

    #start-btn, #restart-btn {
      padding: 16px 48px;
      font-size: 1.3rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #7fff00;
      color: #1a1a2e;
      box-shadow: 0 0 20px #7fff0060;
      transition: transform 0.1s, box-shadow 0.15s;
    }

    #start-btn:hover, #restart-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 30px #7fff00a0;
    }

    #level-badge {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      background: #ffffff18;
      color: #7fff00;
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<header>
  <h1>🧫 Math Slime</h1>
  <div id="hud">
    <span>Score: <strong id="score-val">0</strong></span>
    <span>Lives: <strong id="lives-val">❤️❤️❤️</strong></span>
    <span>Level: <strong id="level-val">1</strong></span>
  </div>
</header>

<div id="game-area">
  <canvas id="canvas" width="800" height="520"></canvas>
  <div id="overlay">
    <h2>Math Slime</h2>
    <p>Solve math problems to pop the slimes!<br>Don't let them escape off the bottom!</p>
    <button id="start-btn">Start Game</button>
  </div>
  <div id="level-badge" style="display:none">LEVEL <span id="level-badge-val">1</span></div>
</div>

<div id="answer-bar"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── State ───────────────────────────────────────────────────
let score, lives, level, slimes, currentQ, answers, gameRunning, animId;
let lastSpawn, spawnInterval, slimeSpeed;
let combo = 0;
let popParticles = [];

const COLORS = [
  { body:'#4ade80', eye:'#166534', shade:'#16a34a' },
  { body:'#60a5fa', eye:'#1e3a5f', shade:'#2563eb' },
  { body:'#f472b6', eye:'#831843', shade:'#db2777' },
  { body:'#fb923c', eye:'#7c2d12', shade:'#ea580c' },
  { body:'#a78bfa', eye:'#3b0764', shade:'#7c3aed' },
  { body:'#34d399', eye:'#064e3b', shade:'#059669' },
];

// ─── Math question generator ──────────────────────────────────
function genQuestion(lvl) {
  const ops = lvl < 3 ? ['+','-'] : lvl < 5 ? ['+','-','×'] : ['+','-','×','÷'];
  const op  = ops[Math.floor(Math.random() * ops.length)];
  let a, b, answer;

  if (op === '+') {
    a = rand(1, 10 + lvl * 4);
    b = rand(1, 10 + lvl * 4);
    answer = a + b;
  } else if (op === '-') {
    a = rand(2, 12 + lvl * 4);
    b = rand(1, a);
    answer = a - b;
  } else if (op === '×') {
    a = rand(2, 5 + lvl);
    b = rand(2, 5 + lvl);
    answer = a * b;
  } else {
    b = rand(2, 8);
    answer = rand(2, 8);
    a = b * answer;
  }

  return { text: `${a} ${op} ${b}`, answer };
}

function buildAnswers(correct, lvl) {
  const set = new Set([correct]);
  const range = Math.max(5, Math.floor(correct * 0.5));
  while (set.size < 4) {
    let wrong = correct + rand(-range, range);
    if (wrong !== correct && wrong >= 0) set.add(wrong);
  }
  return shuffle([...set]);
}

// ─── Slime class ─────────────────────────────────────────────
class Slime {
  constructor(question) {
    this.q    = question;
    this.x    = rand(60, W - 60);
    this.y    = -60;
    this.r    = 36;
    this.color= COLORS[Math.floor(Math.random() * COLORS.length)];
    this.vy   = slimeSpeed * (0.8 + Math.random() * 0.4);
    this.vx   = (Math.random() - 0.5) * 0.8;
    this.wobble = 0;
    this.wobbleDir = 1;
    this.alpha = 1;
    this.popping = false;
    this.popScale = 1;
    this.alive = true;
    this.id = Math.random();
  }

  update(dt) {
    if (this.popping) {
      this.popScale += dt * 4;
      this.alpha -= dt * 5;
      if (this.alpha <= 0) this.alive = false;
      return;
    }
    this.y += this.vy * dt * 60;
    this.x += this.vx * dt * 60;
    this.wobble += this.wobbleDir * dt * 3;
    if (Math.abs(this.wobble) > 0.15) this.wobbleDir *= -1;
    if (this.x < this.r) { this.x = this.r; this.vx *= -1; }
    if (this.x > W - this.r) { this.x = W - this.r; this.vx *= -1; }
    if (this.y > H + this.r) this.alive = false;
  }

  isEscaped() {
    return !this.popping && this.y > H + this.r;
  }

  pop() {
    this.popping = true;
    spawnParticles(this.x, this.y, this.color.body);
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    if (this.popping) ctx.scale(this.popScale, this.popScale);

    const sx = 1 + Math.sin(this.wobble) * 0.12;
    const sy = 1 - Math.sin(this.wobble) * 0.08;
    ctx.scale(sx, sy);

    // shadow
    ctx.beginPath();
    ctx.ellipse(4, this.r * 0.7, this.r * 0.9, this.r * 0.3, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#00000040';
    ctx.fill();

    // body
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color.body;
    ctx.fill();

    // shade
    ctx.beginPath();
    ctx.arc(-4, -4, this.r * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = this.color.shade + '50';
    ctx.fill();

    // shine
    ctx.beginPath();
    ctx.ellipse(-this.r * 0.3, -this.r * 0.35, this.r * 0.22, this.r * 0.13, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff70';
    ctx.fill();

    // eyes
    for (const ex of [-10, 10]) {
      ctx.beginPath();
      ctx.arc(ex, -8, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 1.5, -7, 3, 0, Math.PI * 2);
      ctx.fillStyle = this.color.eye;
      ctx.fill();
    }

    // smile
    ctx.beginPath();
    ctx.arc(0, 4, 10, 0.2, Math.PI - 0.2);
    ctx.strokeStyle = this.color.eye;
    ctx.lineWidth = 2;
    ctx.stroke();

    // question text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 3;
    ctx.fillText(this.q.text, 0, this.r + 16);
    ctx.shadowBlur = 0;

    ctx.restore();
  }
}

// ─── Particles ───────────────────────────────────────────────
function spawnParticles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    popParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 4 + Math.random() * 5,
      color,
      alpha: 1,
      life: 0.6 + Math.random() * 0.4
    });
  }
}

function updateParticles(dt) {
  popParticles = popParticles.filter(p => {
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.15;
    p.alpha -= dt / p.life;
    return p.alpha > 0;
  });
}

function drawParticles() {
  for (const p of popParticles) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  }
}

// ─── Background ──────────────────────────────────────────────
let bgStars = Array.from({length: 40}, () => ({
  x: Math.random() * W, y: Math.random() * H,
  r: 0.5 + Math.random() * 1.5,
  alpha: 0.2 + Math.random() * 0.5,
  twinkle: Math.random() * Math.PI * 2,
}));

function drawBg(t) {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, W, H);
  for (const s of bgStars) {
    s.twinkle += 0.02;
    ctx.save();
    ctx.globalAlpha = s.alpha * (0.6 + 0.4 * Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
  }
}

// ─── UI helpers ──────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('lives-val').textContent = '❤️'.repeat(lives);
  document.getElementById('level-val').textContent = level;
  document.getElementById('level-badge-val').textContent = level;
}

function renderAnswers(ans) {
  const bar = document.getElementById('answer-bar');
  bar.innerHTML = '';
  ans.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = v;
    btn.onclick = () => handleAnswer(v, btn);
    bar.appendChild(btn);
  });
}

function handleAnswer(value, btn) {
  if (!gameRunning || !currentQ) return;
  if (value === currentQ.answer) {
    btn.classList.add('correct');
    popActiveSlime();
    combo++;
    const pts = 10 + (combo > 1 ? (combo - 1) * 5 : 0) + level * 2;
    score += pts;
    showFloatText(`+${pts}${combo>1?' 🔥x'+combo:''}`, '#7fff00');
    updateHUD();
    setTimeout(() => { btn.classList.remove('correct'); nextQuestion(); }, 250);
  } else {
    btn.classList.add('wrong');
    combo = 0;
    setTimeout(() => btn.classList.remove('wrong'), 350);
  }
}

let floatTexts = [];
function showFloatText(text, color) {
  floatTexts.push({ text, color, x: W/2, y: H/2, alpha: 1, vy: -1.5, life: 1.2 });
}

function updateFloatTexts(dt) {
  floatTexts = floatTexts.filter(f => {
    f.y += f.vy * dt * 60;
    f.alpha -= dt / f.life;
    return f.alpha > 0;
  });
}

function drawFloatTexts() {
  for (const f of floatTexts) {
    ctx.save();
    ctx.globalAlpha = f.alpha;
    ctx.font = 'bold 26px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 6;
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
}

// ─── Game logic ──────────────────────────────────────────────
function nextQuestion() {
  if (!slimes.length) return;
  currentQ = slimes[0].q;
  answers = buildAnswers(currentQ.answer, level);
  renderAnswers(answers);
}

function popActiveSlime() {
  if (!slimes.length) return;
  slimes[0].pop();
}

function checkEscaped() {
  for (let i = slimes.length - 1; i >= 0; i--) {
    if (slimes[i].isEscaped() && !slimes[i].popping) {
      slimes[i].alive = false;
      lives--;
      combo = 0;
      showFloatText('-1 ❤️', '#e74c3c');
      updateHUD();
      if (lives <= 0) { endGame(); return; }
    }
  }
}

function spawnSlime() {
  const q = genQuestion(level);
  slimes.push(new Slime(q));
  if (slimes.length === 1) nextQuestion();
}

function levelUp() {
  level++;
  spawnInterval = Math.max(1200, 3500 - level * 200);
  slimeSpeed    = 0.3 + level * 0.08;
  showLevelBadge();
  updateHUD();
}

let levelBadgeTimer = 0;
function showLevelBadge() {
  const badge = document.getElementById('level-badge');
  badge.style.display = 'block';
  levelBadgeTimer = 2;
}

// ─── Main loop ───────────────────────────────────────────────
let lastTime = 0;
let timeSinceLevel = 0;

function loop(ts) {
  if (!gameRunning) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;
  timeSinceLevel += dt;

  // level up every 30s
  if (timeSinceLevel >= 30) {
    timeSinceLevel = 0;
    levelUp();
  }

  // spawn
  if (ts - lastSpawn > spawnInterval) {
    lastSpawn = ts;
    spawnSlime();
  }

  // update
  slimes.forEach(s => s.update(dt));
  checkEscaped();
  slimes = slimes.filter(s => s.alive);
  if (slimes.length > 0 && (!currentQ || currentQ !== slimes[0].q)) nextQuestion();

  updateParticles(dt);
  updateFloatTexts(dt);

  // level badge hide
  if (levelBadgeTimer > 0) {
    levelBadgeTimer -= dt;
    if (levelBadgeTimer <= 0) document.getElementById('level-badge').style.display = 'none';
  }

  // draw
  drawBg(ts);
  slimes.forEach(s => s.draw());
  drawParticles();
  drawFloatTexts();

  animId = requestAnimationFrame(loop);
}

// ─── Start / End ─────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; level = 1; combo = 0;
  slimes = []; popParticles = []; floatTexts = [];
  spawnInterval = 3200; slimeSpeed = 0.35;
  lastSpawn = performance.now() - spawnInterval;
  timeSinceLevel = 0;
  currentQ = null;
  gameRunning = true;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('level-badge').style.display = 'none';
  renderAnswers([]);
  updateHUD();
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>Game Over!</h2>
    <p class="big">Score: ${score}</p>
    <p>You reached Level ${level}</p>
    <button id="restart-btn">Play Again</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('restart-btn').onclick = startGame;
  document.getElementById('answer-bar').innerHTML = '';
}

document.getElementById('start-btn').onclick = startGame;

// initial draw
drawBg(0);

// ─── Utils ───────────────────────────────────────────────────
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
</script>
</body>
</html>
